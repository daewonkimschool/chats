<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 오픈 채팅방</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 이름 입력 화면 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #login-box { background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px; }
        #login-box h2 { margin-bottom: 15px; font-size: 1.2rem; }
        #nickname-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; font-size: 1rem; text-align: center;}
        #start-btn { width: 100%; background: #007fff; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        /* 채팅 화면 */
        #chat-wrapper { width: 100%; max-width: 400px; height: 90vh; background: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; display: none; }
        #header { background: #007fff; color: white; padding: 15px 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; }
        #logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        #logout-btn:hover { background: rgba(255,255,255,0.3); }
        
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* 메시지 스타일 */
        .msg-box { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.4; word-break: break-all; position: relative; display: flex; flex-direction: column; }
        .msg-box.other { background: #e9ecef; align-self: flex-start; border-top-left-radius: 2px; margin-top: 15px; }
        .msg-box.me { background: #007fff; color: white; align-self: flex-end; border-top-right-radius: 2px; }
        .msg-box.system { background: #fff3cd; color: #856404; align-self: center; text-align: center; font-size: 0.8rem; border-radius: 30px; max-width: 90%; padding: 5px 15px; }
        
        .sender-name { font-size: 0.75rem; color: #6c757d; position: absolute; top: -18px; left: 5px; white-space: nowrap; }
        .msg-time { font-size: 0.7rem; color: #adb5bd; align-self: flex-end; margin-top: 4px; }
        .msg-box.me .msg-time { color: rgba(255, 255, 255, 0.7); }

        #form { display: flex; padding: 12px; background: #fff; border-top: 1px solid #eaeaea; }
        #input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 0.95rem; }
        #send { background: #007fff; color: white; border: none; padding: 0 18px; margin-left: 8px; border-radius: 24px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div id="login-box">
        <h2>사용할 이름을 입력하세요</h2>
        <input type="text" id="nickname-input" placeholder="닉네임 (최대 8자)" maxlength="8" autocomplete="off">
        <button id="start-btn">채팅 시작하기</button>
    </div>
</div>

<div id="chat-wrapper">
    <div id="header">
        <span>실시간 오픈 대화방</span>
        <button id="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div id="messages"></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="메시지를 입력하세요..." required />
        <button id="send">전송</button>
    </form>
</div>

<script>
    // ⚠️ 본인의 Render 서버 주소로 변경해 주세요!
    // ⚠️ 본인의 Render 서버 주소로 변경해 주세요!
    const SERVER_URL = "https://chats-4ci4.onrender.com"; 
    
    const socket = io(SERVER_URL, { autoConnect: false });

    let myName = "";

    const loginOverlay = document.getElementById('login-overlay');
    const nicknameInput = document.getElementById('nickname-input');
    const startBtn = document.getElementById('start-btn');
    const chatWrapper = document.getElementById('chat-wrapper');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    // 페이지 로드 시 기존에 저장된 이름이 있는지 확인
    window.onload = function() {
        const savedName = localStorage.getItem('chat_nickname');
        if (savedName) {
            myName = savedName;
            connectAndJoin();
        }
        // 🔔 브라우저 알림 권한 요청
        requestNotificationPermission();
    }

    // 알림 권한 요청 함수
    function requestNotificationPermission() {
        if ("Notification" in window) {
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }
    }

    function joinChat() {
        const enteredName = nicknameInput.value.trim();
        if(!enteredName) {
            alert("이름을 입력해주세요!");
            return;
        }
        myName = enteredName;
        localStorage.setItem('chat_nickname', myName);
        connectAndJoin();
    }

    function connectAndJoin() {
        socket.connect();
        socket.emit('join', myName);

        loginOverlay.style.display = 'none';
        chatWrapper.style.display = 'flex';
        input.focus();
    }

    function logout() {
        localStorage.removeItem('chat_nickname');
        location.reload();
    }

    startBtn.addEventListener('click', joinChat);
    nicknameInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') joinChat(); });


    /* [실시간 소켓 이벤트] */

    socket.on('bot message', (msg) => {
        const item = document.createElement('div');
        item.classList.add('msg-box', 'system');
        item.textContent = msg;
        messages.appendChild(item);
        scrollToBottom();
    });

    socket.on('chat history', (history) => {
        history.forEach((data) => {
            appendMessage(data);
        });
    });

    socket.on('chat message', (data) => {
        appendMessage(data);
        
        // 🔔 새 메시지가 왔을 때 푸시 알림 보내기 결정
        const isMe = data.name === myName;
        // 내가 보낸 메시지가 아니고, 현재 사용자가 채팅창 탭을 보고 있지 않을 때만 알림 전송
        if (!isMe && document.hidden) {
            sendPushNotification(data.name, data.text);
        }
    });

    // 🔔 알림 발송 함수
    function sendPushNotification(sender, text) {
        if ("Notification" in window && Notification.permission === "granted") {
            const notification = new Notification(`💬 ${sender}님의 새 메시지`, {
                body: text,
                icon: "https://cdn-icons-png.flaticon.com/512/1041/1041916.png" // 채팅 알림 아이콘 (원하는 이미지 URL로 변경 가능)
            });

            // 알림 클릭 시 채팅창이 켜진 브라우저 탭으로 포커스 이동
            notification.onclick = function() {
                window.focus();
                notification.close();
            };
        }
    }

    function appendMessage(data) {
        const item = document.createElement('div');
        const isMe = data.name === myName;
        
        item.classList.add('msg-box', isMe ? 'me' : 'other');
        
        if(!isMe) {
            item.innerHTML = `
                <span class="sender-name">${data.name}</span>
                <div>${data.text}</div>
                <span class="msg-time">${data.time || ''}</span>
            `;
        } else {
            item.innerHTML = `
                <div>${data.text}</div>
                <span class="msg-time">${data.time || ''}</span>
            `;
        }
        
        messages.appendChild(item);
        scrollToBottom();
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const msgText = input.value.trim();
        
        if (!msgText) return;

        if (!socket.connected) {
            alert("서버와 연결이 지연되고 있습니다. 잠시만 기다려 주세요!");
            return;
        }

        socket.emit('chat message', msgText);
        input.value = '';
    });

    function scrollToBottom() {
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
